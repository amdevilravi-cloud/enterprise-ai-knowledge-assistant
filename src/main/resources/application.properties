spring.application.name=demo

# ============================================
# LLM Provider Configuration
# ============================================
# Set to "openai" to use OpenAI API (default)
# Set to "lmstudio" to use local LM Studio
app.llm.provider=lmstudio

# ============================================
# OpenAI Configuration (used when app.llm.provider=openai)
# ============================================
#spring.ai.openai.api-key=${OPENAI_API_KEY}
#spring.ai.openai.chat.options.model=gpt-4-mini
# spring.ai.openai.base-url=https://api.openai.com/v1

# ============================================
# LM Studio Configuration (used when app.llm.provider=lmstudio)
# ============================================
# Default to localhost for local development; override LM_STUDIO_URL if needed
spring.ai.openai.base-url=${LM_STUDIO_URL:http://192.168.1.11:1234}
# LM Studio doesn't require an API key, but Spring AI expects one
# You can use a dummy value like "not-needed" or any placeholder
spring.ai.openai.api-key=not-needed
spring.ai.openai.chat.options.model=local-model

# ============================================
# Server Configuration
# ============================================
server.port=8080
management.endpoints.web.exposure.include=*
# ============================================
# Database Configuration
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/enterprise_ai
spring.datasource.username=workspace
spring.datasource.password=MyStrongPassword123!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# When Hibernate cannot access JDBC metadata at startup (e.g. DB not available during tests
# or runtime), explicitly set the dialect to avoid the "Unable to determine Dialect"
# error. Adjust if you target a specific Postgres version (PostgreSQL10Dialect, etc.).
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect



# RAG / Re-ranker defaults
app.rag.vectorTopK=20
app.rag.finalTopN=5
app.reranker.strategy=llmReRanker
app.reranker.maxCandidates=50

# Phase 2: Hybrid Search Configuration
app.rag.enableHybridSearch=true
app.rag.keywordTopK=20
app.rag.rrfK=60

# Phase 3: Query Rewriting Configuration
app.rag.enableQueryRewriting=true

# Phase 4: Context Compression Configuration
app.rag.enableContextCompression=true
app.rag.compressionSentenceCount=3

# Phase 5: Multi-Document Retrieval Configuration
app.rag.enableMultiDocumentMode=false

# ============================================
# Phase 6: UI Configuration (Thymeleaf)
# ============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8


# ============================================
# Swagger/OpenAPI Configuration
# ============================================
# Enable Swagger UI at http://localhost:8080/swagger-ui.html
# Enable OpenAPI JSON at http://localhost:8080/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Customize Swagger UI appearance
springdoc.swagger-ui.doc-expansion=list
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true

