spring.application.name=demo

# ============================================
# GitHub Codespaces Configuration
# ============================================
# This profile is activated when running in GitHub Codespaces (SPRING_PROFILES_ACTIVE=codespace)

# ============================================
# LLM Provider Configuration
# ============================================
# Use OpenAI for Codespaces (requires OPENAI_API_KEY secret)
app.llm.provider=openai

# ============================================
# OpenAI Configuration
# ============================================
# API key must be set as a GitHub Codespace secret named OPENAI_API_KEY
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.base-url=https://api.openai.com/v1

# ============================================
# Database Configuration (Docker Compose Service)
# ============================================
# Point to the 'db' service in docker-compose.yml
spring.datasource.url=jdbc:postgresql://db:5432/enterprise_ai
spring.datasource.username=workspace
spring.datasource.password=MyStrongPassword123!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# Server Configuration
# ============================================
server.port=8080

# ============================================
# RAG / Re-ranker defaults
# ============================================
app.rag.vectorTopK=20
app.rag.finalTopN=3
app.reranker.strategy=embedding
app.reranker.maxCandidates=50

