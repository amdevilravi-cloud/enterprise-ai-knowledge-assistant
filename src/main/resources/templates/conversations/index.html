<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversations - Enterprise AI Knowledge Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navigation -->
    <th:block th:insert="~{fragments/navbar}"></th:block>

    <div class="flex-grow-1 d-flex">
        <!-- Sidebar -->
        <th:block th:insert="~{fragments/sidebar}"></th:block>

        <!-- Main Content -->
        <main class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>
                    <i class="fas fa-history me-2"></i>Conversation History
                </h2>
                <div class="input-group" style="max-width: 300px;">
                    <input type="text" class="form-control" placeholder="Search conversations..."
                           hx-post="/api/chat/conversations/search"
                           hx-trigger="keyup changed delay:500ms"
                           hx-target="#conversationList">
                    <button class="btn btn-outline-secondary" type="button">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <div id="conversationList"
                         hx-get="/api/chat/conversations"
                         hx-trigger="load"
                         hx-swap="innerHTML">
                        <div class="text-center text-muted py-5">
                            <i class="fas fa-comments fa-3x mb-3"></i>
                            <p>No conversations yet</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <th:block th:insert="~{fragments/footer}"></th:block>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
