<aside th:fragment="sidebar" class="bg-light border-end sidebar">
    <div class="p-3">
        <h6 class="text-uppercase text-muted fw-bold mb-3">Navigation</h6>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link active" href="/ui/chat">
                    <i class="fas fa-comments me-2"></i>Chat
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/ui/documents">
                    <i class="fas fa-file me-2"></i>Documents
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/ui/conversations">
                    <i class="fas fa-history me-2"></i>Conversations
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/ui/analytics">
                    <i class="fas fa-chart-bar me-2"></i>Analytics
                </a>
            </li>
        </ul>

        <hr class="my-3">

        <h6 class="text-uppercase text-muted fw-bold mb-3">Quick Actions</h6>
        <div class="btn-group-vertical w-100" role="group">
            <button type="button" class="btn btn-sm btn-outline-primary" hx-post="/api/chat/converse/start" hx-target="#main-content">
                <i class="fas fa-plus me-2"></i>New Chat
            </button>
            <button type="button" class="btn btn-sm btn-outline-secondary mt-2" data-bs-toggle="modal" data-bs-target="#uploadModal">
                <i class="fas fa-upload me-2"></i>Upload Doc
            </button>
        </div>

        <hr class="my-3">

        <h6 class="text-uppercase text-muted fw-bold mb-3">Settings</h6>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="darkMode" onchange="toggleTheme()">
            <label class="form-check-label" for="darkMode">Dark Mode</label>
        </div>
    </div>
</aside>
