<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Enterprise AI Knowledge Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/chat.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navigation -->
    <th:block th:insert="~{fragments/navbar}"></th:block>

    <div class="flex-grow-1 d-flex">
        <!-- Sidebar -->
        <th:block th:insert="~{fragments/sidebar}"></th:block>

        <!-- Main Chat Area -->
        <main class="flex-grow-1 d-flex flex-column">
            <!-- Messages Container -->
            <div id="messageList" class="flex-grow-1 overflow-auto p-4 chat-messages"
                 th:attr="hx-get='/api/ui/messages?conversationId=' + ${conversationId}"
                 hx-trigger="load"
                 hx-swap="innerHTML">
                <div class="text-center text-muted py-5">
                    <i class="fas fa-comments fa-3x mb-3"></i>
                    <p>Start a conversation</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="bg-light border-top p-3">
                <form th:attr="hx-post='/api/ui/chat/message?conversationId=' + ${conversationId}"
                      hx-target="#messageList"
                      hx-swap="beforeend"
                      hx-on::after-request="this.reset()"
                      class="input-group mb-3"
                      id="chatForm">
                    <input type="hidden" name="conversationId" th:value="${conversationId}">
                    <textarea class="form-control" id="messageInput" name="message"
                              placeholder="Type your question..." rows="3" required></textarea>
                    <button class="btn btn-primary" type="submit" id="sendBtn">
                        <i class="fas fa-paper-plane me-2"></i>Send
                    </button>
                    <button class="btn btn-secondary" type="button" data-bs-toggle="modal" data-bs-target="#uploadModal">
                        <i class="fas fa-paperclip me-2"></i>Attach
                    </button>
                </form>

                <small class="text-muted">
                    <i class="fas fa-info-circle me-2"></i>Shift+Enter for new line, Enter to send
                </small>
            </div>
        </main>
    </div>

    <!-- Upload Modal -->
    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Upload Document</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form hx-post="/api/documents/upload"
                          hx-encoding="multipart/form-data"
                          hx-on::after-request="if(this.status == 200) document.getElementById('uploadModal').close()"
                          id="uploadForm">
                        <div class="mb-3">
                            <label for="fileInput" class="form-label">Select File (PDF, TXT, DOCX)</label>
                            <input type="file" class="form-control" id="fileInput" name="file"
                                   accept=".pdf,.txt,.docx" required>
                            <small class="form-text text-muted">Max 50MB</small>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Upload</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Citation Modal -->
    <div class="modal fade" id="citationModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Citation Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="citationContent">
                    <!-- Content loaded via HTMX -->
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <th:block th:insert="~{fragments/footer}"></th:block>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
