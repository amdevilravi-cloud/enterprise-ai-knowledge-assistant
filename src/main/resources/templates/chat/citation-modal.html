<div th:fragment="citation" class="citation-preview">
    <div th:if="${citation}" class="mb-3">
        <h6 class="mb-2">Citation Preview</h6>
        <p class="text-muted small"><i class="fas fa-file me-1"></i><span th:text="${citation.documentName}">Document Name</span></p>
        <div class="bg-light p-3 rounded">
            <p th:text="${citation.content}">Citation content</p>
        </div>
    </div>
</div>
