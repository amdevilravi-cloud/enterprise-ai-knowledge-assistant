<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Enterprise AI Knowledge Assistant'">Enterprise AI Knowledge Assistant</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
    <th:block th:insert="~{fragments/head :: extra}"></th:block>
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navigation -->
    <th:block th:insert="~{fragments/navbar}"></th:block>

    <div class="flex-grow-1 d-flex">
        <!-- Sidebar -->
        <th:block th:insert="~{fragments/sidebar}"></th:block>

        <!-- Main Content -->
        <main class="flex-grow-1 container-fluid p-4" id="main-content">
            <th:block th:insert="~{content}"></th:block>
        </main>
    </div>

    <!-- Footer -->
    <th:block th:insert="~{fragments/footer}"></th:block>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- App JS -->
    <script src="/js/app.js"></script>
    <th:block th:insert="~{fragments/scripts :: extra}"></th:block>
</body>
</html>
