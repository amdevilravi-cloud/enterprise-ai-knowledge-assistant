<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents - Enterprise AI Knowledge Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navigation -->
    <th:block th:insert="~{fragments/navbar}"></th:block>

    <div class="flex-grow-1 d-flex">
        <!-- Sidebar -->
        <th:block th:insert="~{fragments/sidebar}"></th:block>

        <!-- Main Content -->
        <main class="flex-grow-1 p-4">
            <h2 class="mb-4">
                <i class="fas fa-file me-2"></i>Document Management
            </h2>

            <!-- Upload Section -->
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">Upload Document</h5>
                    <p class="card-text text-muted">Drag and drop or click to upload PDF, TXT, or DOCX files (max 50MB)</p>

                    <div class="upload-area border-2 border-dashed rounded p-5 text-center" id="uploadArea">
                        <i class="fas fa-cloud-upload-alt fa-3x text-primary mb-3"></i>
                        <p>Drag files here or click to browse</p>
                        <form hx-post="/api/documents/upload"
                              hx-encoding="multipart/form-data"
                              hx-target="#documentList"
                              hx-swap="beforeend"
                              class="position-relative overflow-hidden">
                            <input type="file" name="file" multiple accept=".pdf,.txt,.docx"
                                   class="position-absolute" style="left: -9999px; top: -9999px;">
                            <button type="button" class="btn btn-primary">Select Files</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Documents List -->
            <div class="card">
                <div class="card-header bg-light">
                    <h5 class="card-title mb-0">Uploaded Documents</h5>
                </div>
                <div class="card-body">
                    <div id="documentList"
                         hx-get="/api/documents"
                         hx-trigger="load"
                         hx-swap="innerHTML">
                        <div class="text-center text-muted py-5">
                            <i class="fas fa-folder-open fa-3x mb-3"></i>
                            <p>No documents uploaded yet</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <th:block th:insert="~{fragments/footer}"></th:block>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Drag and drop support
        const uploadArea = document.getElementById('uploadArea');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.add('bg-light');
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.remove('bg-light');
            });
        });

        uploadArea.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            const input = uploadArea.querySelector('input[type="file"]');
            input.files = files;
            uploadArea.querySelector('form').dispatchEvent(new Event('submit'));
        });
    </script>
</body>
</html>
