spring.application.name=demo-test

# ============================================
# H2 Database for Testing (in-memory)
# ============================================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================
# JPA / Hibernate Configuration
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# LLM Provider Configuration
# ============================================
app.llm.provider=lmstudio

# ============================================
# LM Studio Configuration (used when app.llm.provider=lmstudio)
# ============================================
spring.ai.openai.base-url=http://127.0.0.1:1234
spring.ai.openai.api-key=not-needed
spring.ai.openai.chat.options.model=local-model

# ============================================
# Server Configuration
# ============================================
server.port=8080

